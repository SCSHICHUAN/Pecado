<!DOCTYPE html>
<!--
  @file app.html

  【功能】Pecado 主窗口静态 DOM 骨架与资源引用。
    - 布局：aside 侧栏（功能入口 + 历史占位）+ main 面板（标题、#workspace-scroll、#chat-content、#chat-input）
    - 关键节点：#chat-scroll-anchor（滚底锚点）、.send-button、技能按钮条
    - 样式：../css/app.css + highlight.js github-dark（node_modules 相对路径，打包需含依赖）
    - 脚本顺序：../../shared/format-tree.js → ../js/index.js → ../js/chat.js（顺序不可乱）

  【调用方】main/main.js → BrowserWindow.loadFile(RENDERER_HTML)

  【对外能力】无 JS 模块导出；定义页面结构与 preload 注入的 electronAPI 挂载点
-->
<html lang="zh-CN">
<head>
  <link rel="stylesheet" href="../../../node_modules/highlight.js/styles/github-dark.min.css">
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="../../gitgraph/css/git.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="function-list">
        <div class="function-item active" id="nav-pecado" data-view="chat">
          <div class="function-icon">🤖</div>
          <div>Pecado</div>
        </div>
        <div class="function-item" id="nav-git" data-view="git">
          <div class="function-icon">🌿</div>
          <div>Git</div>
        </div>
        <div class="function-item">
          <div class="function-icon">🌐</div>
          <div>AI 浏览器</div>
        </div>
        <div class="function-item">
          <div class="function-icon">📚</div>
          <div>更多</div>
        </div>
      </div>
      <div class="history-list">
        <div class="history-item active">
          <div class="history-icon">📱</div>
          <div>手机版对话</div>
        </div>
        <div class="history-item">
          <div class="history-icon">🔧</div>
          <div>示例会话</div>
        </div>
      </div>
    </aside>
    <div class="content-area">
    <div class="main-panel" id="panel-chat">
      <header class="chat-header">
        <div class="chat-title">手机版对话</div>
        <div class="chat-actions">
          <button type="button" class="chat-action-button">📞</button>
          <button type="button" class="chat-action-button">📤</button>
          <button type="button" class="chat-action-button">⋮</button>
        </div>
      </header>
      <div class="chat-body" id="workspace-scroll">
        <div class="chat-content" id="chat-content">
          <div class="message assistant">
            <div class="message-avatar">🤖</div>
            <div class="message-bubble markdown-body">你好！我是 Pecado。有什么可以帮助你的吗？</div>
          </div>
          <div id="chat-scroll-anchor" class="chat-scroll-anchor" aria-hidden="true"></div>
        </div>
      </div>
      <div class="chat-input">
        <div class="input-container">
          <div class="control-buttons">
            <button type="button" class="control-button">📎</button>
            <button type="button" class="control-button">🎤</button>
          </div>
          <textarea id="chat-input" placeholder="发消息或输入'/'选择技能" rows="1"></textarea>
          <button type="button" class="send-button">▶</button>
        </div>
        <div class="skills-container skills-buttons">
          <button type="button" class="skill-button">📊</button>
          <button type="button" class="skill-button">⚡快速</button>
          <button type="button" class="skill-button">⚙️编程</button>
          <button type="button" class="skill-button">🎨图像生成</button>
          <button type="button" class="skill-button">📝帮我写作</button>
          <button type="button" class="skill-button">📚翻译</button>
          <button type="button" class="skill-button">🎬视频生成</button>
          <button type="button" class="skill-button">⚙️更多</button>
        </div>
      </div>
    </div>
    <div id="panel-git" class="git-panel-mount hidden"></div>
    </div>
  </div>
  <script src="../../shared/format-tree.js"></script>
  <script src="../js/index.js"></script>
  <script src="../../gitgraph/js/git-ui.js"></script>
  <script src="../js/chat.js"></script>
</body>
</html>
