<!DOCTYPE html>
<!--
  app.html — Pecado AI 主窗口静态结构

  侧栏功能入口与历史占位；右侧主面板含标题、#workspace-scroll 包裹 #chat-content（消息列表 + #chat-scroll-anchor）、
  底部多行输入 #chat-input、技能按钮条。
  脚本顺序：project/prompts.js → project/index.js → chat-stream-client.js → command-handlers.js → chat.js；样式：highlight github-dark + app.css。
  node_modules/highlight.js 与本文件路径相对引用，electron-builder 打包时需确保依赖被打入。
-->
<html lang="zh-CN">
<head>
  <link rel="stylesheet" href="../../node_modules/highlight.js/styles/github-dark.min.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="function-list">
        <div class="function-item active">
          <div class="function-icon">🤖</div>
          <div>Pecado</div>
        </div>
        <div class="function-item">
          <div class="function-icon">🌐</div>
          <div>AI 浏览器</div>
        </div>
        <div class="function-item">
          <div class="function-icon">📚</div>
          <div>更多</div>
        </div>
      </div>
      <div class="history-list">
        <div class="history-item active">
          <div class="history-icon">📱</div>
          <div>手机版对话</div>
        </div>
        <div class="history-item">
          <div class="history-icon">🔧</div>
          <div>示例会话</div>
        </div>
      </div>
    </aside>
    <div class="main-panel">
      <header class="chat-header">
        <div class="chat-title">手机版对话</div>
        <div class="chat-actions">
          <button type="button" class="chat-action-button">📞</button>
          <button type="button" class="chat-action-button">📤</button>
          <button type="button" class="chat-action-button">⋮</button>
        </div>
      </header>
      <div class="chat-body" id="workspace-scroll">
        <div class="chat-content" id="chat-content">
          <div class="message assistant">
            <div class="message-avatar">🤖</div>
            <div class="message-bubble markdown-body">你好！我是 Pecado AI。有什么可以帮助你的吗？</div>
          </div>
          <div id="chat-scroll-anchor" class="chat-scroll-anchor" aria-hidden="true"></div>
        </div>
      </div>
      <div class="chat-input">
        <div class="input-container">
          <div class="control-buttons">
            <button type="button" class="control-button">📎</button>
            <button type="button" class="control-button">🎤</button>
          </div>
          <textarea id="chat-input" placeholder="发消息或输入'/'选择技能" rows="1"></textarea>
          <button type="button" class="send-button">▶</button>
        </div>
        <div class="skills-container skills-buttons">
          <button type="button" class="skill-button">📊</button>
          <button type="button" class="skill-button">⚡快速</button>
          <button type="button" class="skill-button">⚙️编程</button>
          <button type="button" class="skill-button">🎨图像生成</button>
          <button type="button" class="skill-button">📝帮我写作</button>
          <button type="button" class="skill-button">📚翻译</button>
          <button type="button" class="skill-button">🎬视频生成</button>
          <button type="button" class="skill-button">⚙️更多</button>
        </div>
      </div>
    </div>
  </div>
  <script src="project/prompts.js"></script>
  <script src="project/index.js"></script>
  <script src="chat-stream-client.js"></script>
  <script src="command-handlers.js"></script>
  <script src="chat.js"></script>
</body>
</html>
