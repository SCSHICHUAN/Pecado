<!DOCTYPE html>
<!--
  @file index.html

  【功能】Pecado 主窗口：侧栏 + 对话区 + Git 面板挂载点。
  【主进程】main/js/main.js 加载本页 + preload/preload.js
  【渲染脚本】
    · shared/format-tree.js
    · pecado/js/index.js      — 对话 UI
    · workflow/js/panel.js    — Workflow 面板
    · gitgraph/js/index.js    — Git 侧栏
  【样式】main/css、pecado/css、workflow/css、gitgraph/css
-->
<html lang="zh-CN">
<head>
  <link rel="stylesheet" href="../../../node_modules/highlight.js/styles/github-dark.min.css">
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="../../pecado/css/index.css">
  <link rel="stylesheet" href="../../workflow/css/index.css">
  <link rel="stylesheet" href="../../gitgraph/css/index.css">
  <link rel="stylesheet" href="../../codX/css/index.css">
  <script>window.require = { paths: { vs: '../../../node_modules/monaco-editor/min/vs' } };</script>
  <script src="../../../node_modules/monaco-editor/min/vs/loader.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="function-list">
        <div class="function-item active" id="nav-pecado" data-view="chat">
          <div class="function-icon">🤖</div>
          <div>Pecado</div>
        </div>
        <div class="function-item" id="nav-coding" data-view="codx">
          <div class="function-icon">💻</div>
          <div>Coding</div>
        </div>
        <div class="function-item" id="nav-workflow" data-view="workflow">
          <div class="function-icon">⚡</div>
          <div>Workflow</div>
        </div>
        <div class="function-item" id="nav-git" data-view="git">
          <div class="function-icon">🌿</div>
          <div>Git</div>
        </div>
        <div class="function-item">
          <div class="function-icon">🌐</div>
          <div>AI 浏览器</div>
        </div>
        <div class="function-item">
          <div class="function-icon">📚</div>
          <div>更多</div>
        </div>
      </div>
      <div class="history-list">
        <div class="history-item active">
          <div class="history-icon">📱</div>
          <div>Pecado</div>
        </div>
        <div class="history-item">
          <div class="history-icon">🔧</div>
          <div>示例会话</div>
        </div>
      </div>
    </aside>
    <div class="main-column">
    <div class="content-area">
    <div class="main-panel" id="panel-chat">
      <header class="chat-header">
        <div class="chat-title">Pecado</div>
        <div class="chat-actions">
          <button type="button" class="chat-action-button">📞</button>
          <button type="button" class="chat-action-button">📤</button>
          <button type="button" class="chat-action-button">⋮</button>
        </div>
      </header>
      <div class="chat-body" id="workspace-scroll">
        <div class="chat-content" id="chat-content">
          <div class="message assistant">
            <div class="message-avatar">🤖</div>
            <div class="message-bubble markdown-body">你好！我是 Pecado。有什么可以帮助你的吗？</div>
          </div>
          <div id="chat-scroll-anchor" class="chat-scroll-anchor" aria-hidden="true"></div>
        </div>
      </div>
      <div class="skill-log-dock" id="skill-log-dock" aria-label="执行日志">
        <nav class="skill-log-tabs" role="tablist" aria-label="日志">
          <span class="git-bottom-tab is-active" role="tab" aria-selected="true">log</span>
        </nav>
        <div class="skill-log-panels">
          <div class="skill-log-output" id="skill-log-output" aria-live="polite"></div>
        </div>
      </div>
      <div class="chat-input">
        <div class="input-container">
          <div class="control-buttons">
            <button type="button" class="control-button">📎</button>
            <button type="button" class="control-button">🎤</button>
          </div>
          <textarea id="chat-input" placeholder="发消息或输入'/'选择技能" rows="1"></textarea>
          <button type="button" class="send-button">▶</button>
        </div>
      </div>
    </div>
    <div id="panel-workflow" class="workflow-panel-mount hidden"></div>
    <div id="panel-git" class="git-panel-mount hidden"></div>
    <div id="panel-codx" class="hidden" aria-label="CodX 编程">
      <div class="codx-shell" id="codx-shell">
        <aside class="codx-sidebar">
          <div class="codx-sidebar-top">
            <button
              type="button"
              id="codx-project-head"
              class="codx-sidebar-head"
              title="在 Finder 中打开工程目录"
            >未打开工程</button>
            <button
              type="button"
              id="codx-close-btn"
              class="codx-sidebar-close"
              title="关闭编程面板"
            >
              <span class="codx-sidebar-close-icon" aria-hidden="true"></span>
            </button>
          </div>
          <div class="codx-file-tree" id="codx-file-tree"></div>
          <div
            class="codx-resizer codx-resizer-v"
            id="codx-resizer-sidebar"
            role="separator"
            aria-orientation="vertical"
            aria-label="调整目录区宽度"
            tabindex="-1"
          ></div>
        </aside>
        <div class="codx-center-column" id="codx-center-column">
        <div class="codx-workspace" id="codx-workspace">
          <div class="codx-editor-pane" id="codx-editor-area">
            <div class="codx-editor-head">
              <div class="codx-editor-tabs" id="codx-editor-tabs" role="tablist" aria-label="已打开文件"></div>
              <button
                type="button"
                id="codx-dock-side-toggle"
                class="codx-dock-side-toggle"
                aria-label="右侧分屏"
                aria-pressed="false"
                title="Pecado/log 显示在编辑区右侧"
              >
                <span class="codx-dock-side-toggle-icon" aria-hidden="true"></span>
              </button>
              <button
                type="button"
                id="codx-sync-xcode-btn"
                class="codx-sync-xcode-btn"
                aria-label="同步到 Xcode"
                title="将所有待确认改动写入 Xcode"
                hidden
              >
                <span class="codx-sync-xcode-icon" aria-hidden="true">
                  <span class="codx-sync-line codx-sync-line--long"></span>
                  <span class="codx-sync-line codx-sync-line--long"></span>
                  <span class="codx-sync-line codx-sync-line--long"></span>
                  <span class="codx-sync-line codx-sync-line--short"></span>
                </span>
              </button>
              <button
                type="button"
                id="codx-minimap-toggle"
                class="codx-minimap-toggle"
                aria-label="切换缩略图"
                aria-pressed="true"
                title="关闭缩略图"
                hidden
              >
                <span class="codx-minimap-toggle-icon" aria-hidden="true">
                  <span class="codx-minimap-line codx-minimap-line--long"></span>
                  <span class="codx-minimap-line codx-minimap-line--long"></span>
                  <span class="codx-minimap-line codx-minimap-line--short"></span>
                </span>
              </button>
            </div>
            <div class="codx-editor-stack">
              <div id="codx-editor-empty" class="codx-editor-empty">NO File open</div>
              <div id="codx-monaco-host"></div>
              <div id="codx-preview-host" class="codx-preview-host hidden" aria-label="文件预览"></div>
            </div>
          </div>
        </div>
        <div class="codx-bottom-bar-anchor" id="codx-bottom-bar-anchor">
          <div class="codx-dock" id="codx-dock">
            <div
              class="codx-resizer codx-resizer-h"
              id="codx-resizer-dock"
              role="separator"
              aria-orientation="horizontal"
              aria-label="调整 Pecado/log 区高度"
              tabindex="-1"
            ></div>
            <div
              class="codx-resizer codx-resizer-v codx-resizer-dock-side"
              id="codx-resizer-dock-side"
              role="separator"
              aria-orientation="vertical"
              aria-label="调整 Pecado/log 区宽度"
              tabindex="-1"
            ></div>
            <nav class="codx-dock-tabs" role="tablist">
              <div class="codx-dock-tab-list">
                <button type="button" class="codx-dock-tab is-active" data-codx-dock-tab="pecado" role="tab">Pecado</button>
                <button type="button" class="codx-dock-tab" data-codx-dock-tab="log" role="tab">log</button>
              </div>
              <button type="button" class="codx-dock-maximize-btn" id="codx-dock-maximize" title="最大化面板">
                <span class="codx-dock-maximize-icon" aria-hidden="true"></span>
              </button>
            </nav>
            <div class="codx-dock-panel" id="codx-dock-pecado">
              <div class="codx-chat-scroll" id="codx-chat-scroll"></div>
              <div id="codx-design-tag" class="codx-design-tag" hidden>
                <img id="codx-design-tag-img" alt="" />
                <span id="codx-design-tag-name"></span>
                <button type="button" id="codx-design-tag-remove" title="移除设计稿">&times;</button>
              </div>
              <div class="codx-chat-input-row">
                <textarea id="codx-chat-input" placeholder="描述要改的代码…" rows="1"></textarea>
                <button type="button" id="codx-chat-send">发送</button>
              </div>
            </div>
            <div class="codx-dock-panel hidden" id="codx-dock-log">
              <div id="codx-log-output"></div>
            </div>
          </div>
        </div>
        </div>
      </div>
    </div>
    </div>
    <footer class="app-bottom-bar">
      <button type="button" class="git-dock-toggle" id="git-dock-toggle" aria-label="展开或收起详情面板" aria-pressed="false" title="详情面板">
        <span class="git-dock-toggle-icon" aria-hidden="true"></span>
      </button>
      <div class="app-bottom-view-tools">
        <div class="app-bottom-tools app-bottom-tools-chat" id="app-bottom-tools-chat" data-app-view="chat">
          <button type="button" class="skill-button skill-button-run" id="pecado-xcode-run-btn" aria-label="运行项目" title="xcode_run">▶</button>
          <button type="button" class="skill-button skill-button-git-focus" id="pecado-codx-git-btn" aria-label="Git 面板" title="全屏 Git 面板" hidden>Git</button>
          <button type="button" id="pecado-ui-pick-btn" aria-label="选择设计稿" title="UI 设计稿" hidden>UI</button>
        </div>
        <!-- Workflow 底部快捷区：有内容时由 workflow 模块注入 #app-bottom-tools-workflow -->
      </div>
    </footer>
    </div>
  </div>
  <div class="pecado-ui-picker hidden" id="pecado-ui-picker">
    <div class="pecado-ui-picker-list" id="pecado-ui-picker-list"></div>
  </div>
  <script src="../../shared/format-tree.js"></script>
  <script src="../../shared/stream-text-reveal.js"></script>
  <script src="../../shared/chat-scroll-follow.js"></script>
  <script src="../../shared/media-utils.js"></script>
  <script src="../../workflow/js/file-type.js"></script>
  <script src="../../pecado/js/index.js"></script>
  <script src="../../pecado/js/log-preview.js"></script>
  <script src="../../pecado/js/skill-log-panel.js"></script>
  <script src="../../workflow/js/panel.js"></script>
    <script src="../../gitgraph/js/git-chat.js"></script>
    <script src="../../gitgraph/js/index.js"></script>
  <script src="../../codX/js/monaco-loader.js"></script>
  <script src="../../codX/js/preview-file.js"></script>
  <script src="../../codX/js/file-tree.js"></script>
  <script src="../../codX/js/diagnostics.js"></script>
  <script src="../../codX/js/objc-monarch.js"></script>
  <script src="../../codX/js/editor-themes.js"></script>
  <script src="../../codX/js/codx-edit-ops.js"></script>
  <script src="../../codX/js/codx-edit-plan.js"></script>
  <script src="../../codX/js/editor.js"></script>
  <script src="../../codX/js/stream-bridge.js"></script>
  <script src="../../codX/js/codx-log.js"></script>
  <script src="../../codX/js/codx-live-status.js"></script>
  <script src="../../codX/js/codx-chat.js"></script>
  <script src="../../codX/js/resizer.js"></script>
  <script src="../../codX/js/index.js"></script>
</body>
</html>
