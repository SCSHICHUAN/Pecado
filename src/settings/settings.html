<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Preferences</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif;
      background: #1e1e1e;
      color: #fff;
      overflow: hidden;
    }

    .settings {
      display: grid;
      grid-template-columns: 180px 1fr;
      height: 100%;
    }

    .sidebar {
      background: #181818;
      border-right: 1px solid #2a2a2a;
      padding: 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar-title {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      padding: 0 10px 10px;
      letter-spacing: 0.02em;
    }

    .nav-item {
      display: block;
      width: 100%;
      border: none;
      background: transparent;
      color: #ccc;
      text-align: left;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .nav-item:hover {
      background: #252525;
      color: #fff;
    }

    .nav-item.active {
      background: #2f3f5f;
      color: #fff;
    }

    .detail {
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100%;
    }

    .detail-header {
      padding: 20px 24px 12px;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    .detail-header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .detail-header p {
      margin-top: 6px;
      font-size: 12px;
      color: #888;
      line-height: 1.5;
    }

    .detail-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 20px 24px;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    label {
      display: block;
      font-size: 13px;
      color: #bbb;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      max-width: 420px;
      padding: 8px 10px;
      margin-bottom: 14px;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      background: #2a2a2a;
      color: #fff;
      font-size: 13px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #5a8dee;
    }

    .field-group { margin-bottom: 8px; }

    .hint {
      font-size: 12px;
      color: #888;
      line-height: 1.5;
      max-width: 420px;
    }

    .config-path {
      margin-top: 8px;
      font-size: 12px;
      color: #888;
      max-width: 420px;
    }

    .config-dir-link {
      display: inline;
      margin: 0;
      padding: 0;
      border: none;
      background: none;
      color: #6a9fd8;
      font: inherit;
      text-align: left;
      word-break: break-all;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .config-dir-link:hover {
      color: #8fbef0;
    }

    .config-dir-link:disabled {
      color: #666;
      cursor: default;
      text-decoration: none;
    }

    .placeholder-card {
      max-width: 420px;
      padding: 16px;
      border: 1px dashed #3a3a3a;
      border-radius: 8px;
      color: #999;
      font-size: 13px;
      line-height: 1.6;
    }

    .detail-footer {
      padding: 12px 24px 20px;
      border-top: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }

    .actions { display: flex; gap: 8px; }

    button.action {
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
    }

    .save { background: #5a8dee; color: #fff; }

    .status {
      flex: 1;
      min-width: 0;
      min-height: 18px;
      font-size: 12px;
      color: #7dcea0;
      word-break: break-all;
    }

    .status.error { color: #e08d8d; }
  </style>
</head>
<body>
  <div class="settings">
    <aside class="sidebar">
      <div class="sidebar-title">设置</div>
      <button type="button" class="nav-item active" data-panel="volc">火山设置</button>
      <button type="button" class="nav-item" data-panel="general">通用</button>
      <button type="button" class="nav-item" data-panel="appearance">外观</button>
      <button type="button" class="nav-item" data-panel="shortcuts">快捷键</button>
      <button type="button" class="nav-item" data-panel="about">关于</button>
    </aside>

    <section class="detail">
      <header class="detail-header">
        <h1 id="detail-title">火山设置</h1>
        <p id="detail-desc">配置火山方舟 API 密钥与 Bot 模型。</p>
      </header>

      <div class="detail-body">
        <div class="panel active" id="panel-volc">
          <div class="field-group">
            <label for="api-key">Volc Ark API Key</label>
            <input id="api-key" type="text" autocomplete="off" spellcheck="false">
          </div>
          <div class="field-group">
            <label for="model">Bot Model ID</label>
            <input id="model" type="text" autocomplete="off" spellcheck="false">
          </div>
          <p class="config-path">
            配置目录：
            <button type="button" class="config-dir-link" id="config-dir-btn" disabled></button>
          </p>
        </div>

        <div class="panel" id="panel-general">
          <div class="field-group">
            <label for="language">界面语言</label>
            <select id="language" disabled>
              <option>简体中文</option>
              <option>English</option>
            </select>
          </div>
          <div class="field-group">
            <label for="startup">启动时</label>
            <select id="startup" disabled>
              <option>打开上次工程</option>
              <option>显示空白工作区</option>
            </select>
          </div>
          <p class="hint">通用选项尚未接入，后续版本开放。</p>
        </div>

        <div class="panel" id="panel-appearance">
          <div class="field-group">
            <label for="theme">主题</label>
            <select id="theme" disabled>
              <option selected>深色</option>
              <option>浅色</option>
              <option>跟随系统</option>
            </select>
          </div>
          <div class="field-group">
            <label for="font-size">字号</label>
            <select id="font-size" disabled>
              <option>标准</option>
              <option>较大</option>
            </select>
          </div>
          <p class="hint">外观设置尚未接入，当前固定为深色主题。</p>
        </div>

        <div class="panel" id="panel-shortcuts">
          <div class="placeholder-card">
            <strong>常用快捷键</strong><br><br>
            打开文件夹：⌘O / Ctrl+O<br>
            偏好设置：⌘, / Ctrl+,<br>
            开发者工具：⌥⌘I / Ctrl+Shift+I
          </div>
        </div>

        <div class="panel" id="panel-about">
          <div class="placeholder-card">
            <strong>Pecado</strong><br><br>
            桌面 AI 编程助手<br>
            支持火山方舟、MCP 文件系统与 Xcode 集成。<br><br>
            版本 1.0.0
          </div>
        </div>
      </div>

      <footer class="detail-footer">
        <div class="status" id="status"></div>
        <div class="actions">
          <button type="button" class="action save" id="save-btn">保存</button>
        </div>
      </footer>
    </section>
  </div>

  <script>
    const PANEL_META = {
      volc: { title: '火山设置', desc: '配置火山方舟 API 密钥与 Bot 模型（保存至本地用户目录）。' },
      general: { title: '通用', desc: '语言、启动行为等基础选项。' },
      appearance: { title: '外观', desc: '主题与界面显示偏好。' },
      shortcuts: { title: '快捷键', desc: '查看常用键盘快捷键。' },
      about: { title: '关于', desc: '应用版本与说明。' },
    };

    const navItems = document.querySelectorAll('.nav-item');
    const panels = document.querySelectorAll('.panel');
    const detailTitle = document.getElementById('detail-title');
    const detailDesc = document.getElementById('detail-desc');
    const saveBtn = document.getElementById('save-btn');
    const statusEl = document.getElementById('status');
    const apiKeyEl = document.getElementById('api-key');
    const modelEl = document.getElementById('model');
    const configDirBtn = document.getElementById('config-dir-btn');

    let activePanel = 'volc';
    let currentConfigDir = '';

    function formatConfigDirDisplay(dir) {
      return dir ? dir.replace(/ /g, '\\ ') : '';
    }

    function showConfigDir(configDir) {
      currentConfigDir = configDir || '';
      if (!configDirBtn) return;
      if (!configDir) {
        configDirBtn.textContent = '保存后生成';
        configDirBtn.disabled = true;
        return;
      }
      configDirBtn.textContent = formatConfigDirDisplay(configDir);
      configDirBtn.disabled = false;
      configDirBtn.title = `在 Finder 中打开：${configDir}`;
    }

    async function openConfigDir() {
      if (!currentConfigDir) return;
      const api = requireSettingsAPI();
      if (!api || typeof api.openConfigDir !== 'function') return;
      const result = await api.openConfigDir();
      if (result && !result.ok) {
        setStatus(result.error || '无法打开配置目录', true);
      }
    }

    if (configDirBtn) {
      configDirBtn.addEventListener('click', () => {
        openConfigDir().catch((e) => setStatus(e.message || String(e), true));
      });
    }

    function setStatus(message, isError) {
      statusEl.textContent = message || '';
      statusEl.classList.toggle('error', Boolean(isError));
    }

    function requireSettingsAPI() {
      const api = window.settingsAPI;
      if (!api) {
        setStatus('设置接口未就绪，请完全退出应用后重新打开。', true);
        return null;
      }
      return api;
    }

    function readFormValues() {
      if (document.activeElement && typeof document.activeElement.blur === 'function') {
        document.activeElement.blur();
      }
      return {
        volcArkApiKey: apiKeyEl.value.trim(),
        volcArkModel: modelEl.value.trim(),
      };
    }

    function applyConfig(cfg) {
      if (!cfg || !cfg.ok) {
        setStatus(cfg?.error || '读取配置失败', true);
        return;
      }
      apiKeyEl.value = cfg.volcArkApiKey || '';
      modelEl.value = cfg.volcArkModel || '';
      showConfigDir(cfg.configDir || '');
    }

    function setActivePanel(name) {
      activePanel = name;
      navItems.forEach((item) => {
        item.classList.toggle('active', item.dataset.panel === name);
      });
      panels.forEach((panel) => {
        panel.classList.toggle('active', panel.id === `panel-${name}`);
      });
      const meta = PANEL_META[name] || PANEL_META.volc;
      detailTitle.textContent = meta.title;
      detailDesc.textContent = meta.desc;
      saveBtn.hidden = name !== 'volc';
      if (name !== 'volc') setStatus('', false);
    }

    navItems.forEach((item) => {
      item.addEventListener('click', () => setActivePanel(item.dataset.panel));
    });

    async function loadConfig() {
      const api = requireSettingsAPI();
      if (!api) return;
      applyConfig(await api.getConfig());
    }

    saveBtn.addEventListener('click', async () => {
      if (activePanel !== 'volc') return;
      const api = requireSettingsAPI();
      if (!api) return;

      const payload = readFormValues();
      if (!payload.volcArkApiKey) {
        setStatus('请填写 Volc Ark API Key', true);
        apiKeyEl.focus();
        return;
      }

      saveBtn.disabled = true;
      setStatus('正在保存…', false);
      try {
        const result = await api.saveConfig(payload);
        if (result && result.ok) {
          applyConfig(result);
          setStatus(`已保存至 ${formatConfigDirDisplay(result.configDir || '')}`, false);
        } else {
          setStatus(result?.error || '保存失败', true);
        }
      } catch (e) {
        setStatus(e.message || String(e), true);
      } finally {
        saveBtn.disabled = false;
      }
    });

    setActivePanel('volc');
    loadConfig().catch((e) => {
      setStatus(e.message || String(e), true);
    });
  </script>
</body>
</html>
